name: Deploy to shinyapps.io

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: "shinyapps"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libfreetype6-dev libpng-dev libtiff-dev libjpeg-dev libharfbuzz-dev libfribidi-dev

      - name: Install R packages
        run: |
          install.packages("rsconnect")
          install.packages(c("shiny", "shinythemes", "ggplot2", "dplyr", "tidyr", "readr", "purrr", "tibble", "stringr", "readxl", "janitor", "gapminder", "palmerpenguins", "scales", "lubridate", "plotly", "DT", "sortable", "ggcorrplot", "broom", "report", "RColorBrewer"))
        shell: Rscript {0}

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir    = "app",
            appName   = "quickplot",
            forceUpdate = TRUE
          )
        shell: Rscript {0}
