<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastStats — Client-Side Data Analytics</title>
  <meta name="description" content="FastStats is a blazing-fast, browser-based data analytics tool. Upload your data, wrangle, visualize, run statistics, and build reports — all client-side, powered by a pure-JS engine and Plotly.js.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'%3E%3Cpath d='M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z'/%3E%3C/svg%3E">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Heavy libraries (Plotly, SheetJS) are lazy-loaded on demand by js/lazy.js
       so the app paints instantly. The data engine is pure JS — no WASM. -->
</head>
<body>
  <!-- Background effects -->
  <div class="bg-mesh" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loader-spinner"></div>
    <p>Initializing FastStats engine…</p>
  </div>

  <!-- App shell -->
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <a class="logo" href="#" aria-label="FastStats Home">
          <span class="logo-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg></span>
          <span class="gradient-text">FastStats</span>
        </a>
        <div class="external-links">
          <a href="https://github.com/noahweidig" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.38c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61a3.18 3.18 0 00-1.33-1.76c-1.09-.74.08-.73.08-.73a2.52 2.52 0 011.84 1.24 2.56 2.56 0 003.5 1 2.56 2.56 0 01.76-1.6c-2.67-.3-5.47-1.33-5.47-5.93a4.64 4.64 0 011.24-3.22 4.3 4.3 0 01.12-3.18s1-.32 3.3 1.23a11.38 11.38 0 016 0c2.28-1.55 3.28-1.23 3.28-1.23a4.3 4.3 0 01.12 3.18 4.64 4.64 0 011.24 3.22c0 4.61-2.81 5.63-5.48 5.92a2.86 2.86 0 01.82 2.22v3.29c0 .32.22.7.82.58A12 12 0 0012 .3"/></svg>
            GitHub
          </a>
          <a href="https://noahweidig.com" target="_blank" rel="noopener noreferrer" aria-label="Personal Website">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
            Website
          </a>
          <a href="https://linkedin.com/in/noahweidig/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
            LinkedIn
          </a>
        </div>
      </div>
    </header>

    <!-- Upload bar -->
    <div class="upload-bar">
      <div class="upload-bar-inner">
        <div class="upload-group">
          <label class="upload-label" id="upload-trigger">
            <svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            Upload CSV / Excel
            <input type="file" id="file-upload" accept=".csv,.tsv,.xlsx,.xls">
          </label>
          <label class="header-check-label">
            <input type="checkbox" id="header-check" checked>
            CSV has header
          </label>
        </div>
        <div class="dataset-selector">
          <label for="dataset-select">Dataset</label>
          <select id="dataset-select" class="form-select" style="width: auto; min-width: 200px;">
            <option value="iris">Sample: Iris flower measurements</option>
            <option value="gapminder">Sample: Gapminder global development</option>
            <option value="penguins">Sample: Palmer Penguins</option>
            <option value="mtcars">Sample: Motor Trend car specs</option>
          </select>
        </div>
        <div class="current-data">
          <div>
            <div class="current-data-label">Current data</div>
            <div id="current-data-name">Loading…</div>
          </div>
          <span id="current-data-badge" class="badge badge-sample">Sample dataset</span>
          <span id="current-data-dims" class="dims-label"></span>
        </div>
      </div>
    </div>

    <!-- Body: sidebar + main -->
    <div class="app-body">
      <!-- Sidebar navigation -->
      <nav class="sidebar-nav" aria-label="Main navigation">
        <button class="nav-tab active" data-tab="overview">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>
          <span>Overview</span>
        </button>
        <button class="nav-tab" data-tab="view">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.06 12.35a1 1 0 0 1 0-.7 10.75 10.75 0 0 1 19.88 0 1 1 0 0 1 0 .7 10.75 10.75 0 0 1-19.88 0"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span>View</span>
        </button>
        <button class="nav-tab" data-tab="wrangle">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span>
          <span>Wrangle</span>
        </button>
        <button class="nav-tab" data-tab="plot">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="m19 9-5 5-4-4-3 3"/></svg></span>
          <span>Plot</span>
        </button>
        <button class="nav-tab" data-tab="stats">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 8.7 15.3 2.7a1 1 0 0 0-1.4 0l-11.2 11.2a1 1 0 0 0 0 1.4l6 6a1 1 0 0 0 1.4 0l11.2-11.2a1 1 0 0 0 0-1.4z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/></svg></span>
          <span>Stats</span>
        </button>
        <button class="nav-tab" data-tab="report">
          <span class="tab-icon" aria-hidden="true"><svg class="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></span>
          <span>Report</span>
          <span id="report-count-badge" class="nav-badge" style="display:none">0</span>
        </button>
      </nav>

      <!-- Main content area -->
      <main class="main-panel">
        <div id="tab-overview"></div>
        <div id="tab-view" style="display:none"></div>
        <div id="tab-wrangle" style="display:none"></div>
        <div id="tab-plot" style="display:none"></div>
        <div id="tab-stats" style="display:none"></div>
        <div id="tab-report" style="display:none"></div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      Built by <a href="https://noahweidig.com" target="_blank" rel="noopener noreferrer">Noah Weidig</a> · Pure-JS engine &amp; Plotly.js · 100% client-side
    </footer>
  </div>

  <!-- App entry point (pure-JS ES modules) -->
  <script type="module" src="js/app.js"></script>
  <!-- Failsafe: if module load itself fails, never leave the spinner forever. -->
  <script>
    setTimeout(function () {
      var o = document.getElementById('loading-overlay');
      if (o && getComputedStyle(o).display !== 'none' && !o.querySelector('.loader-error')) {
        o.innerHTML = '<div class="loader-error"><p><strong>FastStats could not start</strong></p>'
          + '<p class="muted">The app scripts failed to load. Check your connection and reload.</p>'
          + '<button class="btn btn-primary btn-sm" onclick="location.reload()">Reload</button></div>';
      }
    }, 15000);
  </script>
</body>
</html>
